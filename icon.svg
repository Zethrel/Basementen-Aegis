<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    
    <!-- Neon Gradient -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Shadow for Depth -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Icon Shape (Maskable Canvas) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)" />
  
  <!-- Outer Tech Border Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#cyberGrad)" stroke-width="4" stroke-opacity="0.2" stroke-dasharray="20 10 5 10" />
  
  <!-- Glowing Shield Graphic -->
  <g filter="url(#neonGlow)">
    <!-- Shield Path -->
    <path d="M256,70 C340,70 390,105 390,105 C390,105 390,260 355,340 C325,410 256,442 256,442 C256,442 187,410 157,340 C122,260 122,105 122,105 C122,105 172,70 256,70 Z" 
          fill="none" 
          stroke="url(#cyberGrad)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Inner Graphic: Binary / Key Grid -->
    <!-- Key Top Circle -->
    <circle cx="256" cy="180" r="45" fill="none" stroke="url(#cyberGrad)" stroke-width="8" />
    <circle cx="256" cy="180" r="15" fill="url(#cyberGrad)" />
    
    <!-- Key Shaft -->
    <line x1="256" y1="225" x2="256" y2="330" stroke="url(#cyberGrad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Key Teeth -->
    <path d="M256,260 L290,260 M256,290 L280,290 M256,320 L300,320" stroke="url(#cyberGrad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Decorative Tech Nodes -->
    <circle cx="256" cy="380" r="6" fill="#06b6d4" />
    <circle cx="170" cy="220" r="4" fill="#6366f1" opacity="0.6" />
    <circle cx="342" cy="220" r="4" fill="#06b6d4" opacity="0.6" />
  </g>
</svg>
